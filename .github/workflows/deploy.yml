name: Deploy FastAPI to App Engine (Free Tier)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Name of the App Engine service'
        required: true
        default: 'fastapi-api'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          version: 'latest'

      - name: Verify gcloud auth
        run: gcloud auth list

      - name: Generate app.yaml dynamically
        run: |
          cat > app.yaml <<EOF
          service: ${{ github.event.inputs.service_name }}
          runtime: python310
          entrypoint: uvicorn app.main:app --host=0.0.0.0 --port=\$PORT

          automatic_scaling:
            max_instances: 1
            min_instances: 0

          env_variables:
            SECRET_KEY: "${{ secrets.SECRET_KEY }}"
            ALGORITHM: "${{ secrets.ALGORITHM }}"
            ACCESS_TOKEN_EXPIRE_MINUTES: "${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}"
            DATABASE_URL: "${{ secrets.DATABASE_URL }}"
            GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
            ENVIRONMENT: "${{ secrets.ENVIRONMENT }}"
          EOF

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to App Engine
        run: gcloud app deploy app.yaml --quiet --verbosity=info