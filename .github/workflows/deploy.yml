name: Deploy FastAPI to App Engine (Free Tier)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Name of the App Engine service'
        required: true
        default: 'fastapi-api'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        # This step uses the raw JSON string directly, which is correct
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          version: 'latest'

      - name: Verify gcloud auth
        run: gcloud auth list

      - name: 📝 Generate app.yaml dynamically (FINAL FIX: Literal Block Scalar)
        # 1. Define GitHub secrets as environment variables for this step
        env:
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
          APP_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          APP_ALGORITHM: ${{ secrets.ALGORITHM }}
          APP_ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          APP_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APP_ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          
        # 2. Use shell substitution to generate app.yaml
        run: |
          cat > app.yaml <<EOF
          service: $SERVICE_NAME
          runtime: python310
          # $PORT must be escaped so App Engine gets the literal string $PORT
          entrypoint: uvicorn app.main:app --host=0.0.0.0 --port=\$PORT

          automatic_scaling:
            max_instances: 1
            min_instances: 0

          env_variables:
            # Applying Literal Block Scalar (|) to values that might contain 
            # quotes or colons (like your DATABASE_URL)
            SECRET_KEY: |
              $APP_SECRET_KEY
            ALGORITHM: "$APP_ALGORITHM"
            ACCESS_TOKEN_EXPIRE_MINUTES: "$APP_ACCESS_TOKEN_EXPIRE_MINUTES"
            DATABASE_URL: |
              $APP_DATABASE_URL
            GEMINI_API_KEY: "$APP_GEMINI_API_KEY"
            ENVIRONMENT: "$APP_ENVIRONMENT"
          EOF

          echo "Generated app.yaml:"
          cat app.yaml

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to App Engine
        run: gcloud app deploy app.yaml --quiet --verbosity=info